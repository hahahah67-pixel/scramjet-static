    <div class="page">

        <button id="go-btn" aria-label="Go">

    <script type="module">
      const status = document.getElementById('status')
      try {
        const BASE = new URL('./', document.baseURI).pathname

        await import('./scramjet-engine/scramjet.js')
        const { ScramjetController } = $scramjetLoadController()

        const sj = new ScramjetController({
          prefix: BASE + 'scramjet/',
          files: {
            wasm: BASE + 'scramjet-engine/scramjet.wasm',
            all:  BASE + 'scramjet-engine/scramjet-all.js',
            sync: BASE + 'scramjet-engine/scramjet-sync.js',

        })

        const reg = await navigator.serviceWorker.register(BASE + 'sw.js', { scope: BASE })

            const candidate = reg.installing || reg.waiting || reg.active
            if (!candidate) { resolve(); return }
            candidate.addEventListener('statechange', function handler(e) {
              if (e.target.state === 'activated') {
                candidate.removeEventListener('statechange', handler)
                resolve()
              }
            })
          })
        }

        await sj.init()

        const conn = new _0zzl94._ak44v7(BASE + 'bare-mux/bare-mux-worker.js')
        await conn.setTransport(BASE + 'transport/libcurl.mjs', [{ wisp: 'wss://anura.pro/wisp/' }])

        status.textContent = 'Ready'

        // ── URL normalisation ─────────────────────────────────────────────
        // Used both by the search bar AND by the SW rewriter when it encounters
        // links that have no protocol (e.g. href="example.com/page").
        // Fix 1: new-tab links — sj.encodeUrl() always receives a fully-qualified
        //         URL because we normalise before handing off.
        // Fix 2: searches go to DuckDuckGo instead of Google.

        function toUrl(raw) {
          const s = raw.trim()
          if (!s) return null

          // User explicitly typed a protocol — honour it exactly
          if (/^https?:\/\//i.test(s)) return s

          // Looks like a domain (has a dot, no spaces) — always assume https://
          // This also covers protocol-relative links like "//example.com"
          if (/^\/\//.test(s)) return 'https:' + s
          if (/^[^\s]+\.[^\s]+$/.test(s)) return 'https://' + s

          // Everything else is a search query → DuckDuckGo
          return 'https://duckduckgo.com/?q=' + encodeURIComponent(s)
        }

        function navigate(raw) {
          const url = toUrl(raw)
          if (!url) return
          window.location.href = sj.encodeUrl(url)
        }

        const bar = document.getElementById('searchbar')
        document.getElementById('go-btn').addEventListener('click', () => navigate(bar.value))
        bar.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(bar.value) })

      } catch (err) {
        status.style.color = '#f87171'
        status.textContent = 'Error: ' + err.message
        console.error('[Scramjet STATIC] init error:', err)
      }
    </script>
