<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Scramjet STATIC</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&display=swap" rel="stylesheet" />
    <script src="./bare-mux/bare-mux.js"></script>
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body { height: 100%; overflow: hidden; background: #000; font-family: 'Roboto', sans-serif; color: #fff; }
      #home { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: 12vh; background: #000; z-index: 10; transition: opacity 0.18s ease; }
      #home.hidden { opacity: 0; pointer-events: none; }
      .title { font-size: clamp(2rem, 5vw, 3.5rem); font-weight: 300; letter-spacing: 0.04em; white-space: nowrap; margin-bottom: 2.2rem; text-shadow: 0 0 40px rgba(255,255,255,0.18); }
      .title span { font-weight: 500; }
      .bar-wrap { width: min(600px, 88vw); position: relative; }
      .bar-wrap input { width: 100%; padding: 0.85rem 3rem 0.85rem 1.25rem; border-radius: 999px; border: 1.5px solid rgba(255,255,255,0.18); background: rgba(255,255,255,0.06); color: #fff; font-family: 'Roboto', sans-serif; font-size: 1rem; font-weight: 300; outline: none; transition: border-color 0.2s, background 0.2s; backdrop-filter: blur(6px); }
      .bar-wrap input::placeholder { color: rgba(255,255,255,0.38); }
      .bar-wrap input:focus { border-color: rgba(255,255,255,0.45); background: rgba(255,255,255,0.1); }
      .bar-wrap button { position: absolute; right: 0.75rem; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; padding: 0.25rem; display: flex; align-items: center; color: rgba(255,255,255,0.5); transition: color 0.2s; }
      .bar-wrap button:hover { color: #fff; }
      #status { margin-top: 1rem; font-size: 0.78rem; color: rgba(255,255,255,0.3); letter-spacing: 0.03em; min-height: 1.2em; text-align: center; }

      /* ── WISP settings panel ─────────────────────────────────────── */
      #wisp-panel {
        width: min(600px, 88vw);
        margin-top: 1.4rem;
        background: rgba(126,200,255,0.1);
        border: 1.5px solid rgba(126,200,255,0.35);
        border-radius: 14px;
        padding: 0.85rem 1rem;
      }

      #wisp-panel .wisp-label {
        font-size: 0.72rem;
        font-weight: 500;
        color: #fff;
        letter-spacing: 0.04em;
        margin-bottom: 0.5rem;
      }

      #wisp-panel .wisp-row {
        display: flex;
        gap: 0.5rem;
        align-items: center;
      }

      #wisp-url-input {
        flex: 1;
        min-width: 0;
        background: rgba(0,0,0,0.35);
        border: 1px solid rgba(126,200,255,0.3);
        border-radius: 999px;
        color: #cfe9ff;
        font-family: 'Roboto', sans-serif;
        font-size: 0.78rem;
        padding: 0.5rem 0.9rem;
        outline: none;
        transition: border-color 0.15s;
      }
      #wisp-url-input:focus { border-color: #7ec8ff; }
      #wisp-url-input::selection { background: #1a6abf; color: #fff; }

      .wisp-btn {
        flex-shrink: 0;
        background: #4a9eff;
        color: #06121f;
        border: none;
        font-family: 'Roboto', sans-serif;
        font-size: 0.72rem;
        font-weight: 500;
        letter-spacing: 0.03em;
        padding: 0.5rem 0.9rem;
        border-radius: 999px;
        cursor: pointer;
        transition: background 0.15s, transform 0.08s;
      }
      .wisp-btn:hover { background: #6ab0ff; }
      .wisp-btn:active { transform: scale(0.95); }
      .wisp-btn.reset { background: #3a7fd6; }
      .wisp-btn.reset:hover { background: #5590dd; }

      /* ── "wisp server set!" toast ────────────────────────────────── */
      #wisp-toast {
        position: fixed;
        bottom: -60px;
        left: 1.2rem;
        background: #4a9eff;
        color: #06121f;
        font-family: 'Roboto', sans-serif;
        font-size: 0.82rem;
        font-weight: 500;
        letter-spacing: 0.03em;
        padding: 0.65rem 1.4rem;
        border-radius: 999px;
        box-shadow: 0 4px 18px rgba(74,158,255,0.4);
        z-index: 50;
        transition: bottom 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.3s ease, transform 0.3s ease;
        opacity: 0;
        transform: translateX(-30px);
      }
      #wisp-toast.visible {
        bottom: 1.2rem;
        opacity: 1;
        transform: translateX(0);
      }
      #wisp-toast.leaving {
        opacity: 0;
        transform: translateX(-40px);
      }
      #browser { position: fixed; inset: 0; width: 100%; height: 100%; border: none; background: #111; z-index: 5; display: none; }
      #browser.visible { display: block; }

      /* Floating home button — small black pill, bottom center */
      #home-fab {
        position: fixed;
        bottom: 1.1rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        width: 44px;
        height: 44px;
        border-radius: 50%;
        background: rgba(0,0,0,0.75);
        border: 1px solid rgba(255,255,255,0.15);
        display: none;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        backdrop-filter: blur(8px);
        transition: background 0.15s, transform 0.1s;
        color: #fff;
      }
      #home-fab.visible { display: flex; }
      #home-fab:hover { background: rgba(255,255,255,0.12); }
      #home-fab:active { transform: translateX(-50%) scale(0.92); }

      /* Slim baby-blue loading bar, top of the iframe */
      #load-bar {
        position: fixed;
        top: 0; left: 0;
        height: 3px;
        width: 0%;
        background: #7ec8ff;
        box-shadow: 0 0 6px rgba(126,200,255,0.6);
        z-index: 25;
        opacity: 0;
        border-radius: 0 2px 2px 0;
      }
    </style>
  </head>
  <body>
    <div id="home">
      <h1 class="title">Scramjet <span>STATIC</span></h1>
      <div class="bar-wrap">
        <input id="searchbar" type="text" placeholder="Browse the web" autocomplete="off" autocorrect="off" spellcheck="false" />
        <button id="go-btn" aria-label="Go">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>
      </div>
      <p id="status">Initialising…</p>

      <!-- WISP server settings panel -->
      <div id="wisp-panel">
        <div class="wisp-label">WISP SERVER</div>
        <div class="wisp-row">
          <input id="wisp-url-input" type="text" autocomplete="off" spellcheck="false" />
          <button id="wisp-set-btn" class="wisp-btn">Set</button>
          <button id="wisp-reset-btn" class="wisp-btn reset">Reset</button>
        </div>
      </div>
    </div>

    <!-- "wisp server set!" toast -->
    <div id="wisp-toast">wisp server set!</div>

    <iframe
      id="browser"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals allow-downloads"
      allow="autoplay; fullscreen"
    ></iframe>

    <!-- Baby blue loading bar -->
    <div id="load-bar"></div>

    <!-- Manual home button — bypasses browser history entirely -->
    <div id="home-fab" title="Home" aria-label="Go home">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
        <polyline points="9 22 9 12 15 12 15 22"/>
      </svg>
    </div>

    <script type="module">
      const status  = document.getElementById('status')
      const home    = document.getElementById('home')
      const frame   = document.getElementById('browser')
      const bar     = document.getElementById('searchbar')
      const homeFab = document.getElementById('home-fab')
      const loadBar = document.getElementById('load-bar')
      const wispInput   = document.getElementById('wisp-url-input')
      const wispSetBtn  = document.getElementById('wisp-set-btn')
      const wispResetBtn = document.getElementById('wisp-reset-btn')
      const wispToast   = document.getElementById('wisp-toast')

      // ── Loading bar — fake but convincing multi-stage progress ────────
      // Fast burst at the start, slows down as it approaches the "end",
      // then snaps to 100% and fades when the iframe actually fires load.
      let loadBarTimer = null
      let loadBarStep = null

      function startLoadBar() {
        clearTimeout(loadBarTimer)
        clearInterval(loadBarStep)
        loadBar.style.transition = 'none'
        loadBar.style.width = '0%'
        loadBar.style.opacity = '1'

        // Force reflow so the transition below actually applies
        void loadBar.offsetWidth

        let pct = 0
        loadBar.style.transition = 'width 0.2s linear'
        loadBarStep = setInterval(() => {
          // Slow down as we approach 90% — never quite finishes on its own
          const remaining = 90 - pct
          const step = Math.max(remaining * 0.08, 0.4)
          pct = Math.min(pct + step, 90)
          loadBar.style.width = pct + '%'
          if (pct >= 90) clearInterval(loadBarStep)
        }, 120)
      }

      function finishLoadBar() {
        clearInterval(loadBarStep)
        loadBar.style.transition = 'width 0.25s ease'
        loadBar.style.width = '100%'
        loadBarTimer = setTimeout(() => {
          loadBar.style.transition = 'opacity 0.3s ease'
          loadBar.style.opacity = '0'
          loadBarTimer = setTimeout(() => {
            loadBar.style.width = '0%'
          }, 300)
        }, 200)
      }

      let browsing = false

      const BASE = new URL('./', document.baseURI).pathname
      const DEFAULT_WISP = 'wss://anura.pro/wisp/'
      let currentConn = null // set once bare-mux connection object exists

      function getSavedWisp() {
        return localStorage.getItem('fish-wisp') || DEFAULT_WISP
      }

      function showToast() {
        clearTimeout(showToast._hideTimer)
        clearTimeout(showToast._cleanupTimer)
        wispToast.classList.remove('leaving')
        // Force reflow so re-triggering the animation works if clicked twice fast
        void wispToast.offsetWidth
        wispToast.classList.add('visible')
        showToast._hideTimer = setTimeout(() => {
          wispToast.classList.add('leaving')
          wispToast.classList.remove('visible')
          showToast._cleanupTimer = setTimeout(() => {
            wispToast.classList.remove('leaving')
          }, 350)
        }, 4000)
      }

      async function applyWisp(url, { persist = true } = {}) {
        if (!currentConn) {
          wispSetBtn.textContent = 'Not ready yet…'
          setTimeout(() => { wispSetBtn.textContent = 'Set' }, 1800)
          return
        }
        wispSetBtn.disabled = true
        wispResetBtn.disabled = true
        const originalText = wispSetBtn.textContent
        wispSetBtn.textContent = 'Setting…'
        try {
          await currentConn.setTransport(
            BASE + 'transport/libcurl.mjs',
            [{ wisp: url }]
          )
          if (persist) localStorage.setItem('fish-wisp', url)
          wispInput.value = url
          wispSetBtn.textContent = 'Set'
          showToast()
        } catch (err) {
          // Surface the real error directly on the button instead of
          // silently failing — this tells us exactly what's wrong
          wispSetBtn.textContent = 'Failed!'
          wispToast.textContent = 'Error: ' + err.message
          wispToast.style.background = '#ff6b6b'
          showToast()
          setTimeout(() => {
            wispToast.textContent = 'wisp server set!'
            wispToast.style.background = ''
          }, 4200)
          console.error('[Scramjet STATIC] setTransport failed:', err)
          setTimeout(() => { wispSetBtn.textContent = originalText }, 2000)
        } finally {
          wispSetBtn.disabled = false
          wispResetBtn.disabled = false
        }
      }

      wispSetBtn.addEventListener('click', async () => {
        const val = wispInput.value.trim()
        if (!val) return
        try {
          await applyWisp(val)
        } catch (e) {
          console.error('[Scramjet STATIC] WISP set failed:', e)
        }
      })

      wispResetBtn.addEventListener('click', async () => {
        try {
          await applyWisp(DEFAULT_WISP)
        } catch (e) {
          console.error('[Scramjet STATIC] WISP reset failed:', e)
        }
      })

      // Show whatever is currently saved as soon as the page loads
      wispInput.value = getSavedWisp()

      function showHome() {
        browsing = false
        home.classList.remove('hidden')
        frame.classList.remove('visible')
        homeFab.classList.remove('visible')
        bar.value = ''
      }

      function showBrowser(encodedUrl) {
        startLoadBar()
        if (!browsing) {
          frame.contentWindow.location.replace(encodedUrl)
        } else {
          frame.src = encodedUrl
        }
        home.classList.add('hidden')
        frame.classList.add('visible')
        homeFab.classList.add('visible')
        if (!browsing) {
          history.pushState({ browsing: true }, '')
          browsing = true
        }
      }

      // Fire the loading bar to completion whenever the iframe finishes
      // loading — this covers both initial navigation and in-site link clicks
      frame.addEventListener('load', () => {
        if (browsing) finishLoadBar()
      })

      // The manual home button — direct call, no history/popstate involved
      // at all, so it can never be broken by Chrome's iframe joint history
      homeFab.addEventListener('click', () => {
        showHome()
        history.replaceState({ home: true }, '')
      })

      window.addEventListener('popstate', (e) => {
        if (e.state && e.state.browsing) {
          showHome()
          history.replaceState({ home: true }, '')
        }
      })

      function toUrl(raw) {
        const s = raw.trim()
        if (!s) return null
        if (/^https?:\/\//i.test(s)) return s
        if (/^\/\//.test(s)) return 'https:' + s
        if (/^[^\s]+\.[^\s]+$/.test(s)) return 'https://' + s
        return 'https://duckduckgo.com/?q=' + encodeURIComponent(s)
      }

      try {
        const WISP   = getSavedWisp()
        const PREFIX = BASE + 'scramjet/'

        const isFirstLoad = !navigator.serviceWorker.controller

        if (isFirstLoad) {
          status.textContent = 'Preparing…'
          const regs = await navigator.serviceWorker.getRegistrations()
          await Promise.all(regs.map(r => r.unregister()))
          await new Promise(r => {
            const req = indexedDB.deleteDatabase('$scramjet')
            req.onsuccess = req.onerror = req.onblocked = r
          })
        }

        status.textContent = 'Loading engine…'
        await import('./scramjet-engine/scramjet.js')

        status.textContent = 'Starting controller…'
        const { ScramjetController } = $scramjetLoadController()
        const sj = new ScramjetController({
          prefix: PREFIX,
          files: {
            wasm: BASE + 'scramjet-engine/scramjet.wasm',
            all:  BASE + 'scramjet-engine/scramjet-all.js',
            sync: BASE + 'scramjet-engine/scramjet-sync.js',
          },
        })

        if (isFirstLoad) {
          status.textContent = 'Writing config…'
          await sj.init()
          status.textContent = 'Registering service worker…'
          await navigator.serviceWorker.register(BASE + 'sw.js', { scope: BASE })
          await navigator.serviceWorker.ready
        } else {
          status.textContent = 'Registering service worker…'
          await navigator.serviceWorker.register(BASE + 'sw.js', { scope: BASE })
          await navigator.serviceWorker.ready
          status.textContent = 'Writing config…'
          await sj.init()
        }

        status.textContent = 'Connecting transport…'
        const conn = new _0zzl94._ak44v7(BASE + 'bare-mux/bare-mux-worker.js')
        await conn.setTransport(BASE + 'transport/libcurl.mjs', [{ wisp: WISP }])
        currentConn = conn

        history.replaceState({ home: true }, '')
        status.textContent = 'Ready'

        function navigate(raw) {
          const url = toUrl(raw)
          if (!url) return
          showBrowser(sj.encodeUrl(url))
        }

        document.getElementById('go-btn').addEventListener('click', () => navigate(bar.value))
        bar.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(bar.value) })

      } catch (err) {
        status.style.color = '#f87171'
        status.textContent = 'Error: ' + err.message
        console.error('[Scramjet STATIC] init error:', err)
      }
    </script>
  </body>
</html>
