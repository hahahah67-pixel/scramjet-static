  <body>
    <div class="page">

        <button id="go-btn" aria-label="Go">

    <script type="module">
      const status = document.getElementById('status')

      try {
        // BASE = /Scramjet-static-demo-build/ on GitHub Pages, / on custom domain
        const BASE = new URL('./', document.baseURI).pathname
        const WISP  = 'wss://anura.pro/wisp/'
        const PREFIX = BASE + 'scramjet/'

        // ── Load Scramjet engine ────────────────────────────────────────
        // Dynamic import guarantees scramjet.bundle.js fully executes and
        // sets $scramjetLoadController before the next line runs.
        await import('./scramjet-engine/scramjet.js')
        const { ScramjetController } = $scramjetLoadController()

        const sj = new ScramjetController({
          prefix: PREFIX,
          files: {
            wasm: BASE + 'scramjet-engine/scramjet.wasm',
            all:  BASE + 'scramjet-engine/scramjet-all.js',
            sync: BASE + 'scramjet-engine/scramjet-sync.js',
          },
          flags: {
            // Show clean, readable error pages instead of raw stack traces
            cleanErrors: true,
            // Emulate service worker registration for sites that need it
            serviceworkers: true,
            // Allow requests that fail rewriting to pass through anyway
            allowFailedIntercepts: true,

        })

        // ── Service Worker registration ─────────────────────────────────
        const reg = await navigator.serviceWorker.register(BASE + 'sw.js', { scope: BASE })

          // After reload, controller will be non-null and init() can post
          // loadConfig to the SW correctly — no missed messages.
          await new Promise(resolve => {
            // Already active (shouldn't happen on first install but be safe)
            if (reg.active && reg.active.state === 'activated') { resolve(); return }

            const candidate = reg.installing || reg.waiting || reg.active
            if (!candidate) { resolve(); return }

            candidate.addEventListener('statechange', function handler(e) {
              if (e.target.state === 'activated') {
                candidate.removeEventListener('statechange', handler)
                resolve()
              }
            })
          })

          // Reload so this page is now controlled by the active SW.
          // On the next load, controller is set and everything works cleanly.
          window.location.reload()
          return
        }

        // ── SW is already controlling this page ─────────────────────────
        // Write config to IDB and post loadConfig message to the active SW.
        // Since controller is non-null, the message lands correctly.
        await sj.init()

        // ── Transport ───────────────────────────────────────────────────
        const conn = new _0zzl94._ak44v7(BASE + 'bare-mux/bare-mux-worker.js')
        await conn.setTransport(BASE + 'transport/libcurl.mjs', [{ wisp: WISP }])

        status.textContent = 'Ready'

        // ── Navigation ──────────────────────────────────────────────────
        function toUrl(raw) {
          const s = raw.trim()
          if (!s) return null
          if (/^https?:\/\//i.test(s)) return s          // explicit protocol
          if (/^\/\//.test(s)) return 'https:' + s       // protocol-relative
          if (/^[^\s]+\.[^\s]+$/.test(s)) return 'https://' + s  // domain
          return 'https://duckduckgo.com/?q=' + encodeURIComponent(s)
        }

        function navigate(raw) {
          const url = toUrl(raw)
          if (!url) return
          window.location.href = sj.encodeUrl(url)
        }

        const bar = document.getElementById('searchbar')
        document.getElementById('go-btn').addEventListener('click', () => navigate(bar.value))
        bar.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(bar.value) })

      } catch (err) {
        status.style.color = '#f87171'
        status.textContent = 'Error: ' + err.message
        console.error('[Scramjet STATIC] init error:', err)
      }
    </script>
